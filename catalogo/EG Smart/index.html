<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Catálogo EG Smart!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .catalog-container {
            /*display:grid;
            grid-template-rows: 435px 435px 435px;
            grid-template-columns: 310px 310px 310px;*/
            width: 945px;
            height: 100%;
        }

        .banner {
            position: absolute;
            left:10px;
            top:0px;
            width: 920px;
            height: 430px;
            text-align: center;
            border: 1px solid #ddd;
            box-shadow: 0 3px 5px rgba(9, 1, 110, 0.1);
            box-sizing: border-box;
            border-radius: 10px;
            padding: auto;

        }

        .banner img {
            margin-top: 4px;
            margin-bottom: 4px;
            margin-left: 0px;
            margin-right: 0px;
            width: 900px;
            height: 420px;
            border: 1px solid white;
            box-shadow: none;
            border-radius: 10px;
        }

        .product {
            width: 300px;
            height: 420px;
            text-align: center;
            border: 1px solid #ddd;
            box-shadow: 0 3px 5px rgba(9, 1, 110, 0.1);
            box-sizing: border-box;
            border-radius: 10px;
        }

        .product img {
            margin-top: 13px;
            margin-left: auto;
            margin-right: auto;
            width: auto;
            height: auto;
            max-width: 270px;
            max-height: 270px;
            border: 1px solid white;
            box-shadow: none;
            border-radius: 0;
        }

        .product-title {
            font-weight: bold;
            margin-top: 10px;
            font-size: 18px;
        }

        .entrega-description {
            color: #e44d26;
            font-size: 16px; 
            margin-top: 10px;
        }

        .product-price {
            color: #e44d26;
            font-size: 18px;
            margin-top: 10px;
        }

        .product-description {
            margin-top: 3px;
            font-size: 15px; 
        }
    </style>
</head>
<body>
    <div class="catalog-container">
        <div class="banner">
            {{banner}}
        </div>
        {{productos}}
    </div>
</body>
</html>
